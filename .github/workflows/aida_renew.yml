name: Aida Auto Renew

on:
  schedule:
  - cron: '0 0,12 * * *'  # 每天 UTC 0点和12点 (北京时间 8点和20点) 运行,每12小时一次,根据服务到期时间自行修改
  workflow_dispatch: # 允许手动触发

jobs:
  Renew-Aida:
    runs-on: ubuntu-latest
    permissions:
      actions: write  
      contents: read
    
    steps:
    # 1. 检出当前公库的代码 (把根目录的 aida_renew.py 拉进运行环境)
    - uses: actions/checkout@v4

    # 2. 部署 Python 3.12 环境
    - name: ⚙ 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # 3. 安装 Linux 虚拟桌面组件与浏览器驱动
    - name: 🛠️ 安装系统依赖和 Python 依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb x11-utils xdotool scrot fonts-noto-cjk
        pip install seleniumbase requests
        seleniumbase install chromedriver

    # 4. [可选] 配置 sing-box 代理 (如果您不需要用代理进行续期，可以把这一整块 step 删掉)
    - name: ⚙ 设置代理 (sing-box)
      continue-on-error: true
      env:
        NODE_LINK: ${{ secrets.NODE_LINK }}
      run: |
        bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh)

    # 5. 核心：启动 1080P 虚拟屏幕并运行续期脚本
    - name: 🚀 运行 Aida 续期脚本
      env:
        # ⚠️ 已经严格与您截图里填写的名称保持 100% 一致！
        EMAIL: ${{ secrets.EMAIL }}
        PASSWORD: ${{ secrets.PASSWORD }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: |
        xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
          python3 aida_renew.py

    # 5.1 若登录/读取剩余时间/延期失败，把当时的截图和页面 HTML 打包上传，方便排查（保留 3 天，自动覆盖旧的）
    - name: 📸 上传失败截图与页面 HTML（如有）
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: login-debug
        path: |
          login_failed.png
          login_failed.html
          dashboard_failed.png
          dashboard_failed.html
          extend_failed.png
          extend_failed.html
        if-no-files-found: ignore
        retention-days: 3

    # 6. 自动保持公库干净：只保留最新 1 次的运行日志
    - name: 🧹 清理旧的工作流运行记录
      if: always()
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        runs=$(gh run list --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
        count=0
        for run_id in $runs; do
          count=$((count + 1))
          if [ $count -gt 1 ]; then
            echo "删除运行记录: $run_id"
            gh run delete $run_id || true
          fi
        done
